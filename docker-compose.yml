services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PORT: "5000"
    ports:
      - "5000:5000"
    networks:
      - telemetryx

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: http://localhost
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - telemetryx

networks:
  telemetryx:
    driver: bridge
